<svg viewBox="0 0 920 460" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, Consolas, monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B6A66"/>
    </marker>
  </defs>
  <rect width="920" height="460" fill="#F6F5F2"/>

  <!-- User -->
  <rect x="30" y="190" width="110" height="70" rx="4" fill="#1B1B1F"/>
  <text x="85" y="221" fill="#fff" font-size="13" text-anchor="middle">USER</text>
  <text x="85" y="240" fill="#C9622A" font-size="11" text-anchor="middle">(browser)</text>

  <!-- Frontend -->
  <rect x="200" y="170" width="170" height="110" rx="4" fill="#FFFFFF" stroke="#E1DDD4" stroke-width="1.5"/>
  <text x="285" y="195" font-size="12" fill="#C9622A" text-anchor="middle">FRONTEND</text>
  <text x="285" y="215" font-size="13" font-weight="bold" text-anchor="middle">React Chat UI</text>
  <text x="285" y="235" font-size="11" fill="#6B6A66" text-anchor="middle">single-page, CDN React</text>
  <text x="285" y="251" font-size="11" fill="#6B6A66" text-anchor="middle">served as static file</text>
  <text x="285" y="267" font-size="11" fill="#6B6A66" text-anchor="middle">by FastAPI</text>

  <!-- Backend -->
  <rect x="430" y="120" width="220" height="220" rx="4" fill="#FFFFFF" stroke="#E1DDD4" stroke-width="1.5"/>
  <text x="540" y="145" font-size="12" fill="#C9622A" text-anchor="middle">BACKEND — FastAPI</text>

  <rect x="450" y="160" width="180" height="44" rx="3" fill="#F4E3D4"/>
  <text x="540" y="178" font-size="11.5" text-anchor="middle" font-weight="bold">/api/chat</text>
  <text x="540" y="194" font-size="10.5" fill="#6B6A66" text-anchor="middle">Conversation State Machine</text>

  <rect x="450" y="214" width="180" height="44" rx="3" fill="#F4E3D4"/>
  <text x="540" y="232" font-size="11.5" text-anchor="middle" font-weight="bold">Issue Classifier</text>
  <text x="540" y="248" font-size="10.5" fill="#6B6A66" text-anchor="middle">rule-based + optional LLM</text>

  <rect x="450" y="268" width="180" height="44" rx="3" fill="#F4E3D4"/>
  <text x="540" y="286" font-size="11.5" text-anchor="middle" font-weight="bold">Ticket Generator</text>
  <text x="540" y="302" font-size="10.5" fill="#6B6A66" text-anchor="middle">builds structured summary</text>

  <!-- Storage -->
  <rect x="710" y="170" width="170" height="110" rx="4" fill="#FFFFFF" stroke="#E1DDD4" stroke-width="1.5"/>
  <text x="795" y="195" font-size="12" fill="#C9622A" text-anchor="middle">STORAGE</text>
  <text x="795" y="216" font-size="13" font-weight="bold" text-anchor="middle">SQLite</text>
  <text x="795" y="236" font-size="11" fill="#6B6A66" text-anchor="middle">conversations table</text>
  <text x="795" y="252" font-size="11" fill="#6B6A66" text-anchor="middle">tickets table (JSON)</text>

  <!-- Optional LLM -->
  <rect x="430" y="370" width="220" height="60" rx="4" fill="#FFFFFF" stroke="#E1DDD4" stroke-dasharray="4,3" stroke-width="1.5"/>
  <text x="540" y="392" font-size="11.5" text-anchor="middle" font-weight="bold">OpenAI API (optional)</text>
  <text x="540" y="410" font-size="10.5" fill="#6B6A66" text-anchor="middle">used only if OPENAI_API_KEY is set</text>

  <!-- Arrows -->
  <line x1="140" y1="225" x2="198" y2="225" stroke="#6B6A66" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="225" x2="428" y2="225" stroke="#6B6A66" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="399" y="216" font-size="9.5" fill="#6B6A66" text-anchor="middle">HTTP</text>
  <text x="399" y="240" font-size="9.5" fill="#6B6A66" text-anchor="middle">JSON</text>

  <line x1="650" y1="225" x2="708" y2="225" stroke="#6B6A66" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="679" y="216" font-size="9.5" fill="#6B6A66" text-anchor="middle">writes</text>

  <line x1="540" y1="312" x2="540" y2="368" stroke="#6B6A66" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <text x="460" y="100" font-size="14" fill="#1B1B1F" font-weight="bold">Issue Reporting Chatbot — Architecture</text>
</svg>
