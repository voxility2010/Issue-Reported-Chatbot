<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 1247 320" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1247" height="320" fill="#ffffff"/>

  <text x="623" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Issue Reporting Chatbot — Architecture</text>

  <text x="700" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#0033cc">HTTP</text>
  <text x="700" y="65" text-anchor="middle" font-size="12" font-weight="bold" fill="#0033cc">JSON</text>

  <!-- USER -->
  <rect x="10" y="118" width="90" height="50" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="55" y="138" text-anchor="middle" font-size="12" fill="#000000">USER</text>
  <text x="55" y="154" text-anchor="middle" font-size="11" fill="#000000">(browser)</text>

  <line x1="100" y1="143" x2="148" y2="143" stroke="#000000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- FRONTEND -->
  <rect x="150" y="100" width="160" height="90" fill="#ffffff" stroke="#0033cc" stroke-width="1"/>
  <text x="230" y="118" text-anchor="middle" font-size="12" fill="#0033cc">FRONTEND</text>
  <line x1="160" y1="124" x2="300" y2="124" stroke="#0033cc" stroke-width="0.5"/>
  <text x="230" y="136" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">React Chat UI</text>
  <line x1="160" y1="142" x2="300" y2="142" stroke="#0033cc" stroke-width="0.5"/>
  <text x="230" y="154" text-anchor="middle" font-size="10" fill="#000000">single-page, CDN React</text>
  <text x="230" y="167" text-anchor="middle" font-size="10" fill="#000000">served as static file</text>
  <text x="230" y="180" text-anchor="middle" font-size="10" fill="#000000">by FastAPI</text>

  <line x1="310" y1="145" x2="358" y2="145" stroke="#000000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- BACKEND container -->
  <rect x="360" y="80" width="600" height="135" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="660" y="98" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">BACKEND — FastAPI</text>

  <!-- /api/chat -->
  <rect x="378" y="112" width="170" height="80" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="463" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#0033cc">/api/chat</text>
  <text x="463" y="150" text-anchor="middle" font-size="10" fill="#000000">Conversation State</text>
  <text x="463" y="163" text-anchor="middle" font-size="10" fill="#000000">Machine</text>

  <!-- Issue Classifier -->
  <rect x="568" y="112" width="190" height="80" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="663" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#0033cc">Issue Classifier</text>
  <text x="663" y="150" text-anchor="middle" font-size="10" fill="#000000">Groq API call —</text>
  <text x="663" y="163" text-anchor="middle" font-size="10" fill="#000000">Llama 3.3 70B</text>

  <!-- Ticket Generator -->
  <rect x="778" y="112" width="160" height="80" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="858" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#0033cc">Ticket Generator</text>
  <text x="858" y="150" text-anchor="middle" font-size="10" fill="#000000">builds structured</text>
  <text x="858" y="163" text-anchor="middle" font-size="10" fill="#000000">summary</text>

  <path d="M 1040 118 C 1040 40, 700 40, 660 80" fill="none" stroke="#000000" stroke-width="1" marker-end="url(#arrow)"/>

  <line x1="960" y1="145" x2="1020" y2="145" stroke="#000000" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="990" y="135" text-anchor="middle" font-size="10" fill="#000000">writes</text>

  <!-- STORAGE -->
  <rect x="1022" y="118" width="135" height="65" fill="#ffffff" stroke="#0033cc" stroke-width="1"/>
  <text x="1089" y="136" text-anchor="middle" font-size="12" fill="#0033cc">STORAGE</text>
  <line x1="1032" y1="142" x2="1147" y2="142" stroke="#0033cc" stroke-width="0.5"/>
  <text x="1089" y="154" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">SQLite</text>
  <line x1="1032" y1="160" x2="1147" y2="160" stroke="#0033cc" stroke-width="0.5"/>
  <text x="1089" y="171" text-anchor="middle" font-size="9.5" fill="#000000">conversations table</text>
  <text x="1089" y="182" text-anchor="middle" font-size="9.5" fill="#000000">tickets table (JSON)</text>

  <line x1="663" y1="215" x2="663" y2="240" stroke="#000000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Groq API (required) -->
  <rect x="513" y="242" width="300" height="70" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <text x="528" y="262" font-size="11" font-weight="bold" fill="#000000">Groq API (required)</text>
  <text x="528" y="278" font-size="10" fill="#000000">Llama 3.3 70B</text>
  <text x="528" y="294" font-size="10" fill="#000000">GROQ_API_KEY must be set — no offline fallback</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#000000"/>
    </marker>
  </defs>
</svg>
