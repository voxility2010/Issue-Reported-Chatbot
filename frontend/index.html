<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Issue Desk — Report a Problem</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  :root {
    --paper: #F3F4F6;
    --panel: #FFFFFF;
    --ink: #111827;
    --ink-soft: #6B7280;
    --line: #E5E7EB;
    --line-soft: #F3F4F6;
    --blue: #185FA5;
    --blue-dark: #0C447C;
    --blue-soft: #E6F1FB;
    --green: #3B6D11;
    --green-soft: #EAF3DE;
    --green-text: #27500A;
    --user-bg: #185FA5;
    --ticket-accent: #185FA5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--panel);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .shell {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--panel);
  }

  /* ── HEADER ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--line);
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--blue-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  .topbar-avatar i { font-size: 20px; color: var(--blue); }

  .online-dot {
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 10px;
    height: 10px;
    background: var(--green);
    border-radius: 50%;
    border: 2px solid var(--panel);
  }

  .topbar-info { flex: 1; }

  .topbar-name {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
  }

  .topbar-sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 1px;
  }

  .topbar-actions { display: flex; gap: 6px; }

  .icon-btn {
    width: 34px;
    height: 34px;
    border: 0.5px solid var(--line);
    border-radius: 8px;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink-soft);
  }

  .icon-btn:hover { background: var(--line-soft); color: var(--ink); }
  .icon-btn i { font-size: 16px; }

  .session-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--ink-soft);
    background: var(--line-soft);
    border: 0.5px solid var(--line);
    border-radius: 4px;
    padding: 3px 8px;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }

  /* ── LOG ── */
  .log {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: #F0F2F5;
    scrollbar-width: thin;
    scrollbar-color: var(--line) transparent;
  }

  /* date divider */
  .date-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    margin: 4px 0;
  }

  .date-divider::before,
  .date-divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--line);
  }

  /* message rows */
  .row { display: flex; gap: 8px; align-items: flex-end; }
  .row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
  }

  .msg-avatar.bot { background: var(--blue-soft); color: var(--blue); }
  .msg-avatar.user { background: #EEEDFE; color: #534AB7; }

  .msg-col { display: flex; flex-direction: column; max-width: 78%; }
  .row.user .msg-col { align-items: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
  }

  .bubble.bot {
    background: var(--panel);
    border: 0.5px solid var(--line);
    color: var(--ink);
    border-bottom-left-radius: 4px;
  }

  .bubble.user {
    background: var(--user-bg);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bubble b { color: inherit; font-weight: 600; }
  .bubble.bot b { color: var(--blue); }

  /* ticket card */
  .ticket-stub {
    background: var(--panel);
    border: 0.5px solid var(--line);
    border-left: 3px solid var(--ticket-accent);
    border-radius: 10px;
    padding: 12px 14px;
    max-width: 78%;
    font-size: 13px;
    margin-top: 4px;
  }

  .ticket-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }

  .ticket-stub .ref {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--blue);
    letter-spacing: 0.03em;
  }

  .ticket-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--green-soft);
    color: var(--green-text);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11.5px;
    font-weight: 500;
    margin-top: 8px;
  }

  .status-dot-green {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  /* typing indicator */
  .typing-row { display: flex; gap: 8px; align-items: flex-end; }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 14px;
    background: var(--panel);
    border: 0.5px solid var(--line);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ink-soft);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── QUICK CHIPS ── */
  .quickbar {
    display: flex;
    gap: 6px;
    padding: 10px 20px 6px;
    flex-wrap: wrap;
    background: var(--panel);
    border-top: 0.5px solid var(--line);
  }

  .quickbar button {
    border: 0.5px solid var(--line);
    background: var(--line-soft);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12.5px;
    cursor: pointer;
    color: var(--ink-soft);
    font-family: inherit;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }

  .quickbar button:hover:not(:disabled) {
    border-color: var(--blue);
    color: var(--blue);
    background: var(--blue-soft);
  }

  .quickbar button:disabled { opacity: 0.4; cursor: default; }

  /* ── COMPOSER ── */
  .composer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px 14px;
    border-top: 0.5px solid var(--line);
    background: var(--panel);
  }

  .attach-btn {
    width: 36px;
    height: 36px;
    border: 0.5px solid var(--line);
    border-radius: 50%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--ink-soft);
    flex-shrink: 0;
  }

  .attach-btn:hover { color: var(--ink); background: var(--line-soft); }
  .attach-btn i { font-size: 16px; }

  .composer input {
    flex: 1;
    border: 0.5px solid var(--line);
    background: var(--line-soft);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  .composer input:focus {
    border-color: var(--blue);
    background: var(--panel);
  }

  .composer input::placeholder { color: var(--ink-soft); }
  .composer input:disabled { opacity: 0.5; }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--blue);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .send-btn:hover:not(:disabled) { background: var(--blue-dark); }
  .send-btn:active:not(:disabled) { transform: scale(0.94); }
  .send-btn:disabled { opacity: 0.4; cursor: default; }
  .send-btn i { font-size: 17px; color: #fff; }
</style>
</head>
<body>

<div id="root"></div>

<script src="/static/vendor/react.production.min.js"></script>
<script src="/static/vendor/react-dom.production.min.js"></script>
<script src="/static/vendor/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API_BASE = "";

function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function renderBold(text) {
  const parts = text.split(/\*\*(.*?)\*\*/g);
  return parts.map((p, i) =>
    i % 2 === 1 ? <b key={i}>{p}</b> : <React.Fragment key={i}>{p}</React.Fragment>
  );
}

function isTicketMessage(text) {
  return /Ticket\s\*\*TCK-[A-Z0-9]+\*\*/.test(text);
}

function TicketStub({ text }) {
  const match = text.match(/TCK-[A-Z0-9]+/);
  return (
    <div className="ticket-stub">
      <div className="ticket-label">Support ticket filed</div>
      <div className="ref">{match ? match[0] : ''}</div>
      <div className="ticket-status">
        <span className="status-dot-green"></span>
        Open
      </div>
    </div>
  );
}

function BotAvatar() {
  return (
    <div className="msg-avatar bot">
      <i className="ti ti-headset" style={{fontSize:'14px'}}></i>
    </div>
  );
}

function App() {
  const sessionId = useRef(uuid());
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const logRef = useRef(null);

  useEffect(() => {
    send("", true);
  }, []);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [messages, busy]);

  async function send(text, isInit = false) {
    if (!isInit) {
      if (!text.trim()) return;
      setMessages(m => [...m, { role: "user", text }]);
    }
    setBusy(true);
    setInput("");
    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId.current, message: text }),
      });
      const data = await res.json();
      setMessages(m => [...m, { role: "bot", text: data.reply }]);
    } catch (e) {
      setMessages(m => [...m, { role: "bot", text: "⚠️ Couldn't reach the server. Is the backend running on port 8000?" }]);
    } finally {
      setBusy(false);
    }
  }

  function handleSubmit(e) {
    e.preventDefault();
    send(input);
  }

  return (
    <div className="shell">

      {/* ── HEADER ── */}
      <div className="topbar">
        <div className="topbar-avatar">
          <i className="ti ti-headset"></i>
          <div className="online-dot"></div>
        </div>
        <div className="topbar-info">
          <div className="topbar-name">Issue Desk</div>
          <div className="topbar-sub">Support · Typically replies instantly</div>
        </div>
        <div className="session-tag">{sessionId.current.slice(0, 8)}</div>
        <div className="topbar-actions">
          <button className="icon-btn" aria-label="More options">
            <i className="ti ti-dots-vertical"></i>
          </button>
        </div>
      </div>

      {/* ── MESSAGE LOG ── */}
      <div className="log" ref={logRef}>
        <div className="date-divider">Today</div>

        {messages.map((m, i) => (
          m.role === "bot" && isTicketMessage(m.text) ? (
            <div className="row bot" key={i}>
              <BotAvatar />
              <div className="msg-col">
                <div className="bubble bot">{renderBold(m.text.split("\n\n")[0])}</div>
                <TicketStub text={m.text} />
                {m.text.split("\n\n").slice(1).map((para, j) => (
                  <div className="bubble bot" key={j} style={{marginTop: 8}}>{renderBold(para)}</div>
                ))}
              </div>
            </div>
          ) : m.role === "bot" ? (
            <div className="row bot" key={i}>
              <BotAvatar />
              <div className="msg-col">
                <div className="bubble bot">{renderBold(m.text)}</div>
              </div>
            </div>
          ) : (
            <div className="row user" key={i}>
              <div className="msg-avatar user">U</div>
              <div className="msg-col">
                <div className="bubble user">{renderBold(m.text)}</div>
              </div>
            </div>
          )
        ))}

        {busy && (
          <div className="typing-row">
            <BotAvatar />
            <div className="typing-indicator">
              <div className="typing-dot"></div>
              <div className="typing-dot"></div>
              <div className="typing-dot"></div>
            </div>
          </div>
        )}
      </div>

      {/* ── QUICK CHIPS ── */}
      <div className="quickbar">
        {["no error", "skip", "yes", "no"].map(q => (
          <button key={q} onClick={() => send(q)} disabled={busy}>{q}</button>
        ))}
      </div>

      {/* ── COMPOSER ── */}
      <form className="composer" onSubmit={handleSubmit}>
        <button type="button" className="attach-btn" aria-label="Attach file">
          <i className="ti ti-paperclip"></i>
        </button>
        <input
          autoFocus
          placeholder="Describe what's happening…"
          value={input}
          onChange={e => setInput(e.target.value)}
          disabled={busy}
        />
        <button type="submit" className="send-btn" disabled={busy || !input.trim()} aria-label="Send">
          <i className="ti ti-send"></i>
        </button>
      </form>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
